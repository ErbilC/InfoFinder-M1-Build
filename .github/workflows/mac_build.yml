name: Build InfoFinder for Mac M1

on:
  workflow_dispatch:

jobs:
  build-mac-m1:
    runs-on: macos-14

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Gerekli Kütüphaneleri Kur
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt 

    - name: InfoFinder'ı Derle (Apple Silicon İçin)
      run: |
        pyinstaller --noconfirm --windowed --name "InfoFinder" --icon "logo.icns" bot.py

    - name: DMG Formatına Çevir (İzinleri Mühürle)
      run: |
        cd dist
        hdiutil create -volname "InfoFinder" -srcfolder "InfoFinder.app" -ov -format UDZO InfoFinder_Mac_M1.dmg

    - name: Hazır DMG Dosyasını İndirilebilir Yap
      uses: actions/upload-artifact@v4
      with:
        name: InfoFinder-Mac-M1-Build
        path: dist/InfoFinder_Mac_M1.dmg
