name: Build InfoFinder for Mac M1

on:
  workflow_dispatch:

jobs:
  build-mac-m1:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Kütüphaneleri Kur
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Derle (M1 İçin)
      run: |
        # --collect-all parametresi, Selenium gibi karmaşık kütüphanelerin
        # eksik parçalarını paket içine gömmesini sağlar.
        pyinstaller --noconfirm --windowed --name "InfoFinder" --icon "logo.icns" --collect-all selenium --collect-all flet bot.py

    - name: DMG Yap
      run: |
        cd dist
        hdiutil create -volname "InfoFinder" -srcfolder "InfoFinder.app" -ov -format UDZO InfoFinder_Mac_M1.dmg

    - name: Dosyayı İndirilebilir Yap
      uses: actions/upload-artifact@v4
      with:
        name: InfoFinder-Mac-M1-Build
        path: dist/InfoFinder_Mac_M1.dmg
